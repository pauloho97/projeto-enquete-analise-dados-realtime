apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: enquete
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: enquete-dashboard:v1
        imagePullPolicy: Never
        env:
        - name: API_URL
          value: http://api:5000
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: enquete
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30001